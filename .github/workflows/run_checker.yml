name: Run checker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-checkers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install telethon python-dotenv pathlib2

      - name: Set up environment variables
        run: |
          touch .env
          echo "API_ID=${{ secrets.API_ID }}" >> .env
          echo "API_HASH=${{ secrets.API_HASH }}" >> .env
          echo "SESSION_NAME=${{ secrets.SESSION_NAME }}" >> .env

      - name: Install network tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tcptraceroute

      - name: Proxy health check and auto-update
        run: |
          # 定义代理检测配置（域名:地区代码）
          declare -A PROXIES=(
            ["proxy.hk.616049.xyz"]="HKG"
            ["proxy.us.616049.xyz"]="LAX" 
            ["proxy.de.616049.xyz"]="FRA"
            ["proxy.sg.616049.xyz"]="SIN"
            ["proxy.jp.616049.xyz"]="NRT"
          )

          # 检测函数
          check_proxy() {
            local proxy=$1
            local count=0
            for i in {1..3}; do
              if ! tcping -w 1 $proxy 443; then
                count=$((count + 1))
              fi
              sleep 0.5
            done
            [ $count -eq 3 ] && return 1 || return 0
          }

          # 执行检测并记录失败节点
          failed_nodes=()
          for proxy in "${!PROXIES[@]}"; do
            if ! check_proxy "$proxy"; then
              echo "❗ $proxy 检测失败"
              failed_nodes+=(${PROXIES[$proxy]})
            else
              echo "✅ $proxy 连接正常"
            fi
          done

          # 执行更新操作
          if [ ${#failed_nodes[@]} -gt 0 ]; then
            unique_nodes=$(printf "%s\n" "${failed_nodes[@]}" | sort -u | tr '\n' ',')
            echo "触发更新: ${unique_nodes%,}"
            python cfstfd.py "${unique_nodes%,}"
          else
            echo "所有节点均正常"
          fi

      - name: Run tcip checker
        run: python checker.py cfip/tcip.txt

      - name: Run ip checker
        run: python checker.py cfip/ip.txt

      - name: Run fd checker
        run: python checker.py cfip/fd.txt

      - name: Run cfip checker
        run: python checker.py cfip/cfip.txt

      - name: Run speed/ip checker
        run: python checker.py speed/ip.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "cfst: Auto-update on $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
